<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Psyche — Schedule</title>
<link rel="stylesheet" href="../shared.css">
<style>
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--line);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  
  .event {
    display: grid;
    grid-template-columns: 40px 80px 100px 1fr 80px;
    gap: 12px;
    padding: 12px 16px;
    background: var(--panel);
    align-items: center;
    font-size: 13px;
  }
  
  .event:hover { background: var(--ink-1); }
  
  .event-icon { font-size: 16px; }
  .event-time { font-weight: 500; color: var(--muted); font-family: 'Monaco', monospace; }
  .event-agent { color: var(--cyan); font-weight: 600; }
  .event-summary { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .event-summary-task { font-weight: 500; }
  .event-summary-result { color: var(--faint); font-size: 12px; }
  .event-cost { text-align: right; font-weight: 500; font-family: 'Monaco', monospace; }
  
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  
  .stat {
    background: linear-gradient(160deg, var(--ink-2), var(--panel));
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
  }
  
  .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 600; font-family: 'Monaco', monospace; }
  .stat-sub { font-size: 12px; color: var(--faint); margin-top: 4px; }
  
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    border: 1px dashed var(--line);
    border-radius: 8px;
    margin: 20px 0;
  }
  
  .empty-emoji { font-size: 48px; margin-bottom: 16px; }
  
  h2 {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin: 32px 0 16px 0;
  }
  
  .time-ago { font-size: 12px; color: var(--faint); }
  
  @media (max-width: 1024px) {
    .event { grid-template-columns: 40px 70px 1fr 70px; }
    .event-agent { display: none; }
  }
  
  @media (max-width: 768px) {
    .stats-row { grid-template-columns: 1fr; }
    .event { grid-template-columns: 40px 60px 1fr; }
    .event-agent, .event-task, .event-cost, .event-result { display: none; }
  }
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">Psyche <span>Mission Control</span></a>
  <a class="tab" href="/">Overview</a>
  <a class="tab active" href="/schedule">Schedule</a>
  <a class="tab" href="/analytics">Analytics</a>
  <a class="tab" href="/agents">Agents</a>
  <a class="tab" href="/billing">Billing</a>
  <a class="tab" href="/tracker">Tracker</a>
  <span class="nav-status" id="navUpdated"></span>
  <div class="nav-dot"></div>
</nav>

<div class="page">
  <h1>Daily Schedule</h1>
  
  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">Tasks</div>
      <div class="stat-value" id="tasksCount">—</div>
      <div class="stat-sub" id="tasksSub">No data yet</div>
    </div>
    <div class="stat">
      <div class="stat-label">Daily Cost</div>
      <div class="stat-value">$<span id="costTotal">—</span></div>
      <div class="stat-sub" id="costSub">No data yet</div>
    </div>
    <div class="stat">
      <div class="stat-label">Errors</div>
      <div class="stat-value" id="errorsCount">—</div>
      <div class="stat-sub" id="errorsSub">No data yet</div>
    </div>
  </div>
  
  <h2>Activity Timeline</h2>
  
  <div class="timeline" id="timeline">
    <div class="empty">
      <div class="empty-emoji">📋</div>
      <div>No schedule data yet</div>
      <div class="time-ago">Run a cron task and sync to see activities</div>
    </div>
  </div>
  
  <div style="text-align: center; color: var(--muted); font-size: 12px; margin-top: 20px;">
    <p>Updates automatically every 30 seconds</p>
    <p id="lastSync" style="color: var(--faint);">Last sync: —</p>
  </div>
</div>

<script>
const RAW_BASE = 'https://raw.githubusercontent.com/mcgillesdorce/openclaw-dashboard/data';
const SCHEDULE_URL = `${RAW_BASE}/schedule_data.json`;

async function loadSchedule() {
  try {
    const response = await fetch(`${SCHEDULE_URL}?t=${Date.now()}`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const data = await response.json();
    renderSchedule(data);
    updateLastSync();
  } catch (err) {
    console.log('Schedule data not available yet:', err.message);
    showEmpty();
  }
}

function renderSchedule(data) {
  const timeline = document.getElementById('timeline');
  
  if (!data.events || data.events.length === 0) {
    showEmpty();
    updateStats(data.totals || {});
    return;
  }
  
  // Update stats
  const totals = data.totals || {};
  document.getElementById('tasksCount').textContent = totals.tasks || 0;
  document.getElementById('tasksSub').textContent = `${totals.tasks || 0} completed`;
  document.getElementById('costTotal').textContent = (totals.cost || 0).toFixed(3);
  document.getElementById('costSub').textContent = `$${(totals.cost || 0).toFixed(2)}`;
  document.getElementById('errorsCount').textContent = totals.errors || 0;
  document.getElementById('errorsSub').textContent = `${totals.errors || 0} failed`;
  
  // Render events
  timeline.innerHTML = data.events.map(event => `
    <div class="event">
      <div class="event-icon">${event.icon || '⏳'}</div>
      <div class="event-time">${event.time || '—'}</div>
      <div class="event-agent">${event.agent || '—'}</div>
      <div class="event-summary">
        <div class="event-summary-task">${event.task || '—'}</div>
        <div class="event-summary-result">${event.result || ''}</div>
      </div>
      <div class="event-cost">${event.cost || '—'}</div>
    </div>
  `).join('');
}

function showEmpty() {
  document.getElementById('timeline').innerHTML = `
    <div class="empty">
      <div class="empty-emoji">📋</div>
      <div>No schedule data yet</div>
      <div class="time-ago">Run a cron task and sync to see activities</div>
    </div>
  `;
}

function updateStats(totals) {
  totals = totals || {};
  document.getElementById('tasksCount').textContent = totals.tasks || '—';
  document.getElementById('tasksSub').textContent = totals.tasks ? `${totals.tasks} completed` : 'No data';
  document.getElementById('costTotal').textContent = totals.cost ? (totals.cost).toFixed(3) : '—';
  document.getElementById('costSub').textContent = totals.cost ? `$${(totals.cost).toFixed(2)}` : 'No data';
  document.getElementById('errorsCount').textContent = totals.errors || '—';
  document.getElementById('errorsSub').textContent = totals.errors ? `${totals.errors} failed` : 'No data';
}

function updateLastSync() {
  const now = new Date();
  document.getElementById('lastSync').textContent = `Last sync: ${now.toLocaleTimeString()}`;
  document.getElementById('navUpdated').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

// Load on start
loadSchedule();

// Refresh every 30 seconds
setInterval(loadSchedule, 30000);
</script>
</body>
</html>
