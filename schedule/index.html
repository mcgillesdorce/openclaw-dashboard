<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychology Video Pipeline — Schedule</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .emoji {
            font-size: 1.2em;
        }
        
        .date {
            font-size: 1.1em;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        
        .last-updated {
            font-size: 0.9em;
            color: #95a5a6;
            margin-top: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .stat-value.cost {
            color: #27ae60;
        }
        
        .stat-value.errors {
            color: #e74c3c;
        }
        
        .timeline {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .timeline h2 {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .event {
            display: grid;
            grid-template-columns: 50px 100px 150px 1fr 80px 100px 150px;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid #ecf0f1;
            align-items: center;
            font-size: 0.95em;
        }
        
        .event:last-child {
            border-bottom: none;
        }
        
        .event:hover {
            background: #f8f9fa;
        }
        
        .event-icon {
            font-size: 1.3em;
            text-align: center;
        }
        
        .event-time {
            color: #7f8c8d;
            font-weight: 600;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .event-agent {
            font-weight: 600;
            color: #2980b9;
            text-transform: uppercase;
            font-size: 0.85em;
        }
        
        .event-task {
            color: #34495e;
            word-break: break-word;
        }
        
        .event-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            text-align: center;
        }
        
        .status-success {
            background: #d5f4e6;
            color: #27ae60;
        }
        
        .status-running {
            background: #fef5e7;
            color: #f39c12;
        }
        
        .status-error {
            background: #fadbd8;
            color: #e74c3c;
        }
        
        .status-warning {
            background: #fdebd0;
            color: #e67e22;
        }
        
        .status-approved {
            background: #d6eaf8;
            color: #2980b9;
        }
        
        .status-restart {
            background: #ebdef0;
            color: #8e44ad;
        }
        
        .event-duration {
            color: #95a5a6;
            font-size: 0.9em;
            text-align: right;
        }
        
        .event-cost {
            color: #27ae60;
            font-weight: 600;
            text-align: right;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .event-result {
            color: #7f8c8d;
            font-size: 0.9em;
            text-align: right;
            word-break: break-word;
        }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #95a5a6;
        }
        
        .empty-emoji {
            font-size: 3em;
            margin-bottom: 20px;
        }
        
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #2980b9;
        }
        
        button.danger {
            background: #e74c3c;
        }
        
        button.danger:hover {
            background: #c0392b;
        }
        
        @media (max-width: 1200px) {
            .event {
                grid-template-columns: 40px 80px 120px 1fr 70px 80px;
                font-size: 0.9em;
            }
            
            .event-result {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .event {
                grid-template-columns: 40px 70px 1fr;
                gap: 10px;
            }
            
            .event-agent,
            .event-task,
            .event-duration,
            .event-cost,
            .event-result {
                display: none;
            }
            
            .timeline {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="date" id="dateDisplay"></div>
            <h1>
                <span class="emoji">📊</span>
                Daily Schedule & Efforts
            </h1>
            <div class="last-updated" id="lastUpdated"></div>
        </header>
        
        <div class="stats" id="statsContainer">
            <div class="stat-card">
                <div class="stat-label">Tasks Completed</div>
                <div class="stat-value" id="tasksCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Cost</div>
                <div class="stat-value cost" id="totalCost">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Errors</div>
                <div class="stat-value errors" id="errorCount">0</div>
            </div>
        </div>
        
        <div class="timeline">
            <h2>
                <span class="emoji">⏰</span>
                Today's Activity Timeline
            </h2>
            <div id="eventsList"></div>
            <div class="controls">
                <button onclick="location.reload()">🔄 Refresh</button>
                <button class="danger" onclick="clearSchedule()">🗑️ Clear</button>
            </div>
        </div>
    </div>
    
    <script>
        const RAW_BASE = 'https://raw.githubusercontent.com/mcgillesdorce/openclaw-dashboard/data';
        const SCHEDULE_URL = `${RAW_BASE}/schedule_data.json?t=${Date.now()}`;
        
        async function loadSchedule() {
            try {
                const response = await fetch(SCHEDULE_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                renderSchedule(data);
            } catch (error) {
                console.error('Failed to load schedule:', error);
                document.getElementById('eventsList').innerHTML = `
                    <div class="empty">
                        <div class="empty-emoji">⚠️</div>
                        <p>Schedule data not yet available. Check back later!</p>
                    </div>
                `;
            }
        }
        
        function renderSchedule(data) {
            // Update header
            const today = new Date();
            document.getElementById('dateDisplay').textContent = 
                today.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            document.getElementById('lastUpdated').textContent = 
                `Last updated: ${new Date(data.last_updated).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
            
            // Update stats
            const summary = data.summary || {};
            document.getElementById('tasksCount').textContent = summary.tasks_completed || 0;
            document.getElementById('totalCost').textContent = summary.total_cost || '$0.00';
            document.getElementById('errorCount').textContent = (data.totals?.errors || 0);
            
            // Render events
            const eventsList = document.getElementById('eventsList');
            const events = data.events || [];
            
            if (events.length === 0) {
                eventsList.innerHTML = `
                    <div class="empty">
                        <div class="empty-emoji">🕐</div>
                        <p>No activities yet today. Agents will show up here as they run.</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (const event of events) {
                const statusClass = `status-${event.status}`;
                html += `
                    <div class="event">
                        <div class="event-icon">${event.icon}</div>
                        <div class="event-time">${event.time}</div>
                        <div class="event-agent">${event.agent}</div>
                        <div class="event-task">${event.task}</div>
                        <div class="event-status ${statusClass}">${event.status}</div>
                        <div class="event-duration">${event.duration}</div>
                        <div class="event-cost">${event.cost}</div>
                    </div>
                `;
            }
            eventsList.innerHTML = html;
        }
        
        function clearSchedule() {
            if (confirm('Clear today\'s schedule? This will reset effort tracking for the day.')) {
                // Note: This would require a backend endpoint to implement
                alert('Schedule clear requires backend support. Currently, schedule auto-resets at midnight.');
            }
        }
        
        // Load on page load
        loadSchedule();
        
        // Refresh every 30 seconds
        setInterval(loadSchedule, 30000);
    </script>
</body>
</html>
