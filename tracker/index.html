<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Psyche — Tracker</title>
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav>
  <a class="nav-brand" href="/">🧠 Psyche <span>Control</span></a>
  <a class="tab" href="/">Overview</a>
  <a class="tab" href="/schedule/">Schedule</a>
  <a class="tab" href="/analytics/">Analytics</a>
  <a class="tab" href="/agents/">Agents</a>
  <a class="tab" href="/billing/">Billing</a>
  <a class="tab active" href="/tracker/">Tracker</a>
  <span class="nav-status" id="navUpdated">updated: —</span>
  <div class="nav-dot"></div>
</nav>

<div class="page">
  <div class="section-title mb-2xl">📍 Content Tracker</div>

  <!-- Quick Stats -->
  <div class="grid g4 mb-2xl">
    <div class="stat-box">
      <div class="stat-label">📺 Total Generated</div>
      <div class="stat-value" id="totalGenerated">—</div>
      <div class="stat-note">all time</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">✅ Approved</div>
      <div class="stat-value" id="totalApproved">—</div>
      <div class="stat-note" id="approvedNote">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">⏳ Pending</div>
      <div class="stat-value" id="totalPending">—</div>
      <div class="stat-note">awaiting review</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">❌ Rejected</div>
      <div class="stat-value" id="totalRejected">—</div>
      <div class="stat-note" id="rejectedNote">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="panel mb-2xl">
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: var(--gap-lg);">
      <div>
        <label style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: var(--gap-sm);">Status</label>
        <select id="filterStatus" style="width: 100%; padding: var(--gap-md); background: var(--bg); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 13px;">
          <option value="">All Statuses</option>
          <option value="approved">Approved</option>
          <option value="pending">Pending</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div>
        <label style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: var(--gap-sm);">Topic</label>
        <select id="filterTopic" style="width: 100%; padding: var(--gap-md); background: var(--bg); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 13px;">
          <option value="">All Topics</option>
        </select>
      </div>
      <div>
        <label style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: var(--gap-sm);">Agent</label>
        <select id="filterAgent" style="width: 100%; padding: var(--gap-md); background: var(--bg); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 13px;">
          <option value="">All Agents</option>
          <option value="Psyche">Psyche</option>
          <option value="Finch">Finch</option>
          <option value="Scout">Scout</option>
          <option value="Pulse">Pulse</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Videos Table -->
  <div class="section">
    <div class="section-title">Content Library</div>
    <div class="panel" style="padding: 0; overflow-x: auto;">
      <table class="table" id="videosTable">
        <thead>
          <tr>
            <th style="width: 120px;">ID</th>
            <th>Topic</th>
            <th>Status</th>
            <th>Agent</th>
            <th>Created</th>
            <th style="text-align: right;">Views</th>
            <th style="text-align: right;">Cost</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7" style="text-align: center; color: var(--text-muted);">Loading videos...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="data-footer">
    <span style="color: var(--text-dim);">Data source: GitHub | Last sync: <span id="lastSync" style="color: var(--cyan); font-family: 'Monaco', 'Courier New', monospace;">—</span></span>
  </div>
</div>

<script src="../config.js"></script>
<script>
const DATA_REPO = 'mcgillesdorce/openclaw-dashboard';
const DATA_BRANCH = 'data';

let allVideos = [];

async function fetchData(file) {
  try {
    const url = `https://raw.githubusercontent.com/${DATA_REPO}/${DATA_BRANCH}/${file}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.error(`Failed to fetch ${file}:`, err);
    return null;
  }
}

async function updateTracker() {
  const data = await fetchData('dashboard_data.json');
  if (!data || !data.videos) return;

  allVideos = data.videos || [];

  // Stats
  const approved = allVideos.filter(v => v.status === 'approved').length;
  const pending = allVideos.filter(v => v.status === 'pending').length;
  const rejected = allVideos.filter(v => v.status === 'rejected').length;

  document.getElementById('totalGenerated').textContent = allVideos.length;
  document.getElementById('totalApproved').textContent = approved;
  document.getElementById('approvedNote').textContent = approved === 1 ? '1 video' : `${approved} videos`;
  document.getElementById('totalPending').textContent = pending;
  document.getElementById('totalRejected').textContent = rejected;
  document.getElementById('rejectedNote').textContent = rejected === 1 ? '1 video' : `${rejected} videos`;

  // Populate topic filter
  const topics = [...new Set(allVideos.map(v => v.topic || 'Unknown'))];
  const topicSelect = document.getElementById('filterTopic');
  const currentValue = topicSelect.value;
  topicSelect.innerHTML = '<option value="">All Topics</option>' + 
    topics.map(t => `<option value="${t}">${t}</option>`).join('');
  topicSelect.value = currentValue;

  // Render table
  renderTable();
  updateTimestamp();
}

function renderTable() {
  let status = document.getElementById('filterStatus').value;
  let topic = document.getElementById('filterTopic').value;
  let agent = document.getElementById('filterAgent').value;

  let filtered = allVideos.filter(v => {
    if (status && v.status !== status) return false;
    if (topic && v.topic !== topic) return false;
    if (agent && v.generated_by !== agent) return false;
    return true;
  });

  const html = filtered
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
    .map(v => {
      const statusIcon = v.status === 'approved' ? '✅' : v.status === 'rejected' ? '❌' : '⏳';
      const statusColor = v.status === 'approved' ? 'var(--green)' : v.status === 'rejected' ? 'var(--red)' : 'var(--amber)';
      const id = v.id || v.topic.slice(0, 3).toUpperCase() + '_' + new Date(v.created_at).getTime().toString().slice(-6);
      const date = new Date(v.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      return `
        <tr>
          <td style="font-family: 'Monaco', 'Courier New', monospace; color: var(--cyan);">${id}</td>
          <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis;">${v.topic || 'Untitled'}</td>
          <td><span style="color: ${statusColor}; font-weight: 700;">${statusIcon} ${v.status}</span></td>
          <td>${v.generated_by || '—'}</td>
          <td>${date}</td>
          <td style="text-align: right; color: var(--cyan); font-weight: 700;">${(v.views || 0).toLocaleString()}</td>
          <td style="text-align: right; font-family: 'Monaco', 'Courier New', monospace;">$${(v.cost_usd || 0).toFixed(2)}</td>
        </tr>
      `;
    }).join('');

  document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">No videos match filters</td></tr>';
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById('navUpdated').textContent = `updated: ${now.toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'})}`;
  document.getElementById('lastSync').textContent = now.toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'});
}

// Event listeners for filters
document.getElementById('filterStatus').addEventListener('change', renderTable);
document.getElementById('filterTopic').addEventListener('change', renderTable);
document.getElementById('filterAgent').addEventListener('change', renderTable);

setInterval(updateTracker, 30000);
updateTracker();
</script>
</body>
</html>
