<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Psyche — Overview</title>
<link rel="stylesheet" href="shared.css">
<style>
  .hero{display:grid;grid-template-columns:minmax(260px,320px) 1fr;gap:16px;margin-bottom:20px}
  @media(max-width:840px){.hero{grid-template-columns:1fr}}
  .gauge-panel{background:linear-gradient(160deg,var(--ink-2),var(--panel));
    border:1px solid var(--line);border-radius:14px;padding:24px;display:flex;flex-direction:column;gap:16px}
  .approval-bar{background:var(--line);border-radius:4px;height:8px;overflow:hidden;margin:4px 0}
  .approval-fill{height:100%;background:var(--cyan);border-radius:4px;transition:width .4s}
  .pipeline-status{display:flex;align-items:center;gap:8px;font-size:13px}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .status-dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2.4s infinite}
  .status-dot.idle{background:var(--amber)}
  .status-dot.error{background:var(--red)}
  .recent-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;
    padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
  .recent-row:last-child{border-bottom:none}
  .topic-tag{font-size:11px;color:var(--faint)}
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">Psyche <span>Mission Control</span></a>
  <a class="tab active" href="/">Overview</a>
  <a class="tab" href="/analytics">Analytics</a>
  <a class="tab" href="/agents">Agents</a>
  <a class="tab" href="/billing">Billing</a>
  <span class="nav-status" id="navUpdated"></span>
  <div class="nav-dot"></div>
</nav>
<div class="page">

  <!-- Hero: gauge + KPIs -->
  <div class="hero">
    <div class="gauge-panel">
      <div>
        <div class="gauge-label">Cost / Approved Video</div>
        <div class="gauge-big mono">$<span id="cpa">—</span></div>
        <div class="gauge-sub">target: &lt;$3.00 · avg all: $<span id="cpg">—</span></div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:var(--muted)">Approval rate</span>
          <span class="mono" id="approvalNote">—</span>
        </div>
        <div class="approval-bar"><div class="approval-fill" id="approvalMeter" style="width:0"></div></div>
        <div style="font-size:11px;color:var(--faint);margin-top:4px"><span id="approvedCount">—</span> approved of <span id="totalCount">—</span> generated</div>
      </div>
      <div>
        <div class="pipeline-status">
          <div class="status-dot idle" id="statusDot"></div>
          <span id="statusText" style="color:var(--muted)">idle</span>
        </div>
        <div style="font-size:11px;color:var(--faint);margin-top:4px" id="lastRunNote"></div>
      </div>
    </div>
    <div class="grid g2" style="align-content:start">
      <div id="kpis" class="grid g2" style="grid-column:1/-1"></div>
    </div>
  </div>

  <!-- Cost trend -->
  <div class="section">
    <div class="section-title">Daily Spend</div>
    <div class="panel">
      <canvas id="costChart" height="120" style="width:100%"></canvas>
    </div>
  </div>

  <!-- Two-column: top videos + topic leaderboard -->
  <div class="grid g2">
    <div class="section" style="margin-bottom:0">
      <div class="section-title">Top Videos by Views</div>
      <div class="panel"><div class="bars" id="topVideos"></div></div>
    </div>
    <div class="section" style="margin-bottom:0">
      <div class="section-title">Topic Leaderboard</div>
      <div class="panel"><div class="bars" id="topicBars"></div></div>
    </div>
  </div>

  <!-- Recent activity -->
  <div class="section" style="margin-top:28px">
    <div class="section-title">Recent Activity</div>
    <div class="panel"><div id="recentList"></div></div>
  </div>

  <div class="data-footer">source: <span id="src">—</span></div>
</div>

<script src="config.js"></script>
<script>
const SAMPLE={
  updated:new Date().toISOString().slice(0,19),
  pipeline_status:"idle",last_run:null,
  kpis:{videos_total:35,videos_approved:25,videos_posted:25,approval_rate_pct:71.4,
    total_cost_usd:53.65,cost_per_approved_usd:2.15,total_views:307300,
    avg_engagement_pct:11.32,total_follows:1223,total_revenue_usd:null},
  cost_trend:[["06-08",4.1],["06-09",3.6],["06-10",5.2],["06-11",4.4],["06-12",3.1],
    ["06-13",4.8],["06-14",3.9],["06-15",5.5],["06-16",2.9],["06-17",4.2],
    ["06-18",3.7],["06-19",4.9],["06-20",3.3],["06-21",4.0]].map(([date,cost])=>({date,cost})),
  top_videos:[
    {topic:"Loss Aversion",views:51000,engagement:13.2,url:"",approved:true},
    {topic:"The Spotlight Effect",views:22000,engagement:10.8,url:"",approved:true},
    {topic:"Dunning-Kruger",views:9000,engagement:9.4,url:"",approved:true},
    {topic:"Cognitive Dissonance",views:4200,engagement:8.1,url:"",approved:true},
    {topic:"The Halo Effect",views:1500,engagement:6.9,url:"",approved:true}],
  topic_leaderboard:[
    {topic:"Loss Aversion",avg_views:28500,count:3,win_rate:100},
    {topic:"The Spotlight Effect",avg_views:16200,count:2,win_rate:100},
    {topic:"Dunning-Kruger",avg_views:7400,count:4,win_rate:75},
    {topic:"Cognitive Dissonance",avg_views:5100,count:3,win_rate:67},
    {topic:"The Halo Effect",avg_views:2300,count:2,win_rate:50}],
  recent:[
    {ts:"2026-06-21T14:22:00",event:"approved",topic:"Loss Aversion",note:"h5 v4 s5 p4"},
    {ts:"2026-06-21T12:05:00",event:"generated",topic:"The Spotlight Effect",note:"$2.23"},
    {ts:"2026-06-21T10:30:00",event:"rejected",topic:"Anchoring Bias",note:"visuals weak"},
    {ts:"2026-06-20T18:00:00",event:"generated",topic:"Dunning-Kruger",note:"$2.18"},
  ]
};

function fmt(n){return n==null?"—":Number(n).toLocaleString()}
function money(n){return n==null?"$—":"$"+Number(n).toFixed(2)}

async function load(){
  let data,live=false;
  try{
    const url=window.__DATA_URL__||"dashboard_data.json";
    const r=await fetch(url,{cache:"no-store"});
    if(r.ok){data=await r.json();live=true;}
  }catch(e){}
  if(!data)data=SAMPLE;
  render(data,live);
}

function render(d,live){
  document.getElementById("src").textContent=live?"live · "+d.updated?.replace("T"," "):"sample data";
  document.getElementById("navUpdated").textContent=live?"live":"demo";

  const k=d.kpis||{};
  const cpv=k.total_cost_usd&&k.videos_total?k.total_cost_usd/k.videos_total:null;
  document.getElementById("cpa").textContent=k.cost_per_approved_usd!=null?Number(k.cost_per_approved_usd).toFixed(2):"—";
  document.getElementById("cpg").textContent=cpv!=null?cpv.toFixed(2):"—";
  document.getElementById("approvalMeter").style.width=(k.approval_rate_pct||0)+"%";
  document.getElementById("approvalNote").textContent=(k.approval_rate_pct||0).toFixed(1)+"%";
  document.getElementById("approvedCount").textContent=fmt(k.videos_approved);
  document.getElementById("totalCount").textContent=fmt(k.videos_total);

  // Status
  const st=d.pipeline_status||"idle";
  const dot=document.getElementById("statusDot");
  dot.className="status-dot "+(st==="running"?"live":st==="error"?"error":"idle");
  document.getElementById("statusText").textContent=st;
  if(d.last_run)document.getElementById("lastRunNote").textContent="last run "+d.last_run.replace("T"," ");

  // KPI cards
  const cards=[
    {k:"Videos made",v:fmt(k.videos_total)},
    {k:"Approved",v:fmt(k.videos_approved),d:(k.approval_rate_pct||0).toFixed(1)+"% rate"},
    {k:"Total spend",v:money(k.total_cost_usd)},
    {k:"Total views",v:fmt(k.total_views)},
    {k:"Avg engagement",v:k.avg_engagement_pct!=null?(k.avg_engagement_pct.toFixed(1)+"%"):"—",
      cls:k.avg_engagement_pct>=8?"delta-up":k.avg_engagement_pct>0?"delta-dn":""},
    {k:"New follows",v:fmt(k.total_follows)},
  ];
  document.getElementById("kpis").innerHTML=cards.map(c=>
    `<div class="kpi"><div class="k">${c.k}</div>
     <div class="v mono ${c.cls||''}">${c.v}</div>${c.d?`<div class="d">${c.d}</div>`:""}</div>`).join("");

  // Cost chart
  drawLine(d.cost_trend||[]);

  // Top videos
  const tv=d.top_videos||[];
  const maxV=Math.max(1,...tv.map(v=>v.views||0));
  document.getElementById("topVideos").innerHTML=tv.length?tv.map(v=>
    `<div class="bar">
      <span class="name" title="${v.topic}">${v.topic}</span>
      <span class="track"><i style="width:${(v.views||0)/maxV*100}%"></i></span>
      <span class="num mono">${fmt(v.views)}</span>
     </div>`).join(""):`<div class="empty">No posted videos yet</div>`;

  // Topic leaderboard
  const tl=d.topic_leaderboard||[];
  const maxT=Math.max(1,...tl.map(t=>t.avg_views||0));
  document.getElementById("topicBars").innerHTML=tl.length?tl.map(t=>
    `<div class="bar">
      <span class="name" title="${t.topic}">${t.topic}</span>
      <span class="track"><i style="width:${(t.avg_views||0)/maxT*100}%"></i></span>
      <span class="num mono">${fmt(t.avg_views)}</span>
     </div>`).join(""):`<div class="empty">No performance data yet</div>`;

  // Recent activity
  const events={approved:"✅",rejected:"❌",generated:"🎬",posted:"📤",error:"⚠️"};
  const recent=d.recent||[];
  document.getElementById("recentList").innerHTML=recent.length?recent.map(r=>
    `<div class="recent-row">
      <span>${events[r.event]||"·"} <strong>${r.topic}</strong> <span class="topic-tag">${r.event}</span></span>
      <span style="color:var(--muted);font-size:12px">${r.note||""}</span>
      <span style="color:var(--faint);font-size:11px">${(r.ts||"").replace("T"," ").slice(0,16)}</span>
     </div>`).join(""):`<div class="empty">No activity yet — run the pipeline</div>`;
}

function drawLine(trend){
  const canvas=document.getElementById("costChart");
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth;
  const H=120;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  ctx.scale(dpr,dpr);
  if(!trend.length){ctx.fillStyle="#4d6376";ctx.font="13px Inter";ctx.fillText("No spend data yet",W/2-60,H/2);return;}
  const vals=trend.map(t=>t.cost||0);
  const maxV=Math.max(...vals,0.01);
  const pad={t:10,r:8,b:24,l:40};
  const uw=(W-pad.l-pad.r)/(vals.length-1||1);
  const uh=(H-pad.t-pad.b)/maxV;
  // grid lines
  ctx.strokeStyle="#243240";ctx.lineWidth=1;
  [0,.5,1].forEach(f=>{
    const y=H-pad.b-f*maxV*uh;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle="#4d6376";ctx.font="10px Inter";
    ctx.fillText("$"+(f*maxV).toFixed(1),2,y+4);
  });
  // area
  const pts=vals.map((v,i)=>({x:pad.l+i*uw,y:H-pad.b-v*uh}));
  ctx.beginPath();ctx.moveTo(pts[0].x,H-pad.b);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H-pad.b);ctx.closePath();
  ctx.fillStyle="rgba(52,224,196,.08)";ctx.fill();
  // line
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle="#34e0c4";ctx.lineWidth=2;ctx.stroke();
  // dots
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle="#34e0c4";ctx.fill();});
  // x labels (every ~4)
  const step=Math.max(1,Math.round(trend.length/6));
  ctx.fillStyle="#4d6376";ctx.font="10px Inter";ctx.textAlign="center";
  trend.forEach((t,i)=>{if(i%step===0)ctx.fillText(t.date||"",pad.l+i*uw,H-6);});
}

load();
window.addEventListener("resize",()=>load());
</script>
</body>
</html>
