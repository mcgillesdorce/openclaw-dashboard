<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Psyche — Agents</title>
<link rel="stylesheet" href="shared.css">
<style>
  .agent-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px}
  .agent-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .agent-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .agent-name{font-size:15px;font-weight:600}
  .agent-role{font-size:12px;color:var(--muted)}
  .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .metric-cell{background:var(--ink-2);border-radius:8px;padding:10px 12px}
  .metric-cell .mk{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}
  .metric-cell .mv{font-size:18px;font-weight:700;margin-top:3px}
  .topic-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:8px}
  .topic-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
  .topic-name{font-size:14px;font-weight:600}
  .topic-meta{font-size:12px;color:var(--muted)}
  .spark{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:6px}
  .spark-fill{height:100%;border-radius:2px}
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">Psyche <span>Mission Control</span></a>
  <a class="tab" href="/">Overview</a>
  <a class="tab" href="/analytics">Analytics</a>
  <a class="tab active" href="/agents">Agents</a>
  <a class="tab" href="/billing">Billing</a>
  <a class="tab" href="/tracker">Tracker</a>
  <span class="nav-status" id="navUpdated"></span>
  <div class="nav-dot"></div>
</nav>
<div class="page">

  <!-- AI Agent cards -->
  <div class="section">
    <div class="section-title">AI Agents — Pipeline Workers</div>
    <div class="grid g2" id="agentCards"></div>
  </div>

  <!-- Topic agents -->
  <div class="section">
    <div class="section-title">Topic Agents — Performance per Subject</div>
    <div class="grid g3" id="topicCards"></div>
  </div>

  <!-- Win/loss by topic -->
  <div class="section">
    <div class="section-title">Win Rate by Topic</div>
    <div class="panel"><div class="bars" id="winRateBars"></div></div>
  </div>

  <!-- Session log -->
  <div class="section">
    <div class="section-title">Recent Pipeline Sessions</div>
    <div class="panel panel-sm" style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>Session</th><th>Topics Generated</th><th>Approved</th><th>Rejected</th>
          <th>Claude calls</th><th>Seedance clips</th><th>EL chars</th><th>Total cost</th><th>Duration</th>
        </tr></thead>
        <tbody id="sessionTable"></tbody>
      </table>
    </div>
  </div>

  <div class="data-footer">source: <span id="src">—</span></div>
</div>

<script src="config.js"></script>
<script>
const SAMPLE_AGENTS={
  updated:new Date().toISOString().slice(0,19),
  ai_agents:[
    {id:"claude",name:"Claude (Haiku)",role:"Script generation",icon:"🧠",
     model:"claude-haiku-4-5",provider:"Anthropic",
     stats:{calls_total:35,calls_this_month:12,avg_latency_s:8.4,
       tokens_in:142000,tokens_out:38000,cost_usd:0.09,success_rate:97.1}},
    {id:"seedance",name:"Seedance",role:"Video generation",icon:"🎬",
     model:"seedance-1-lite",provider:"fal.ai",
     stats:{calls_total:350,calls_this_month:120,avg_latency_s:42,
       clips_generated:350,cost_usd:50.44,success_rate:99.1}},
    {id:"elevenlabs",name:"ElevenLabs",role:"Voiceover / TTS",icon:"🎙️",
     model:"eleven_multilingual_v2",provider:"ElevenLabs",
     stats:{calls_total:35,calls_this_month:12,avg_latency_s:3.2,
       chars_synthesized:214000,cost_usd:3.25,success_rate:100}},
    {id:"psyche",name:"Psyche (Me)",role:"Orchestration & decisions",icon:"🤖",
     model:"claude-sonnet-4-6",provider:"Anthropic",
     stats:{calls_total:null,calls_this_month:null,avg_latency_s:null,
       tokens_in:null,tokens_out:null,cost_usd:11.40,success_rate:null}},
  ],
  topics:[
    {topic:"Loss Aversion",category:"Cognitive Biases",videos:3,approved:3,rejected:0,
     avg_views:28500,avg_engagement:13.2,avg_rating:4.7,total_cost:6.63},
    {topic:"Dunning-Kruger",category:"Cognitive Biases",videos:4,approved:3,rejected:1,
     avg_views:7400,avg_engagement:9.4,avg_rating:4.1,total_cost:8.92},
    {topic:"The Spotlight Effect",category:"Social Psychology",videos:2,approved:2,rejected:0,
     avg_views:16200,avg_engagement:10.8,avg_rating:4.4,total_cost:4.46},
    {topic:"Cognitive Dissonance",category:"Social Psychology",videos:3,approved:2,rejected:1,
     avg_views:5100,avg_engagement:8.1,avg_rating:3.8,total_cost:6.69},
    {topic:"The Halo Effect",category:"Cognitive Biases",videos:2,approved:1,rejected:1,
     avg_views:2300,avg_engagement:6.9,avg_rating:3.3,total_cost:4.46},
    {topic:"Anchoring Bias",category:"Cognitive Biases",videos:2,approved:1,rejected:1,
     avg_views:5000,avg_engagement:7.2,avg_rating:3.5,total_cost:4.48},
  ],
  sessions:[
    {id:"2026-06-21",topics:3,approved:2,rejected:1,claude_calls:3,clips:30,el_chars:18000,cost:6.69,duration_s:380},
    {id:"2026-06-20",topics:2,approved:2,rejected:0,claude_calls:2,clips:20,el_chars:12200,cost:4.46,duration_s:256},
    {id:"2026-06-19",topics:3,approved:1,rejected:2,claude_calls:3,clips:30,el_chars:18500,cost:6.70,duration_s:390},
  ]
};

function fmt(n){return n==null?"—":Number(n).toLocaleString()}
function money(n){return n==null?"$—":"$"+Number(n).toFixed(2)}
function fmtPct(n){return n==null?"—":Number(n).toFixed(1)+"%"}

async function load(){
  let data,live=false;
  try{
    const url=window.__AGENTS_URL__||window.__DATA_URL__||"agents_data.json";
    const r=await fetch(url,{cache:"no-store"});
    if(r.ok){data=await r.json();live=true;}
  }catch(e){}
  if(!data)data=SAMPLE_AGENTS;
  render(data,live);
}

function render(d,live){
  document.getElementById("src").textContent=live?"live · "+d.updated?.replace("T"," "):"sample data";
  document.getElementById("navUpdated").textContent=live?"live":"demo";

  // AI Agent cards
  const agentColors={claude:"#a78bfa",seedance:"#34e0c4",elevenlabs:"#f5b14c",psyche:"#60a5fa"};
  document.getElementById("agentCards").innerHTML=(d.ai_agents||[]).map(a=>{
    const s=a.stats||{};
    const color=agentColors[a.id]||"var(--cyan)";
    const metrics=[
      {k:"Cost this month",v:money(s.cost_usd)},
      {k:"Success rate",v:fmtPct(s.success_rate)},
      {k:"Avg latency",v:s.avg_latency_s!=null?(s.avg_latency_s+"s"):"—"},
    ];
    const extra=a.id==="claude"?[
      {k:"Tokens in",v:fmt(s.tokens_in)},{k:"Tokens out",v:fmt(s.tokens_out)}
    ]:a.id==="seedance"?[
      {k:"Clips generated",v:fmt(s.clips_generated)}
    ]:a.id==="elevenlabs"?[
      {k:"Chars synthesised",v:fmt(s.chars_synthesized)}
    ]:[];
    return`<div class="agent-card">
      <div class="agent-header">
        <div class="agent-icon" style="background:${color}22;color:${color}">${a.icon}</div>
        <div><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-size:11px;color:var(--faint)">${a.provider}</div>
          <div style="font-size:11px;color:var(--muted)">${a.model}</div>
        </div>
      </div>
      <div class="metric-grid">
        ${metrics.map(m=>`<div class="metric-cell"><div class="mk">${m.k}</div><div class="mv mono" style="color:${color}">${m.v}</div></div>`).join("")}
      </div>
      ${extra.length?`<div style="display:flex;gap:10px">${extra.map(m=>`<div style="flex:1;background:var(--ink-2);border-radius:8px;padding:8px 12px"><div style="font-size:11px;color:var(--faint)">${m.k}</div><div class="mono" style="font-size:14px;font-weight:600;margin-top:2px">${m.v}</div></div>`).join("")}</div>`:""}
    </div>`;
  }).join("");

  // Topic cards
  document.getElementById("topicCards").innerHTML=(d.topics||[]).map(t=>{
    const winRate=t.videos?Math.round((t.approved||0)/t.videos*100):0;
    const color=winRate>=80?"var(--green)":winRate>=50?"var(--amber)":"var(--red)";
    return`<div class="topic-card">
      <div class="topic-header">
        <span class="topic-name">${t.topic}</span>
        <span style="font-size:11px;color:var(--faint)">${t.category||""}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
        <span style="color:var(--muted)">Videos</span><span class="mono">${t.videos||0} (${t.approved||0}✅ ${t.rejected||0}❌)</span>
        <span style="color:var(--muted)">Avg views</span><span class="mono">${fmt(t.avg_views)}</span>
        <span style="color:var(--muted)">Engagement</span><span class="mono">${fmtPct(t.avg_engagement)}</span>
        <span style="color:var(--muted)">Rating</span><span class="mono">${t.avg_rating!=null?t.avg_rating.toFixed(1)+"/5":"—"}</span>
        <span style="color:var(--muted)">Total cost</span><span class="mono">${money(t.total_cost)}</span>
        <span style="color:var(--muted)">Win rate</span><span class="mono" style="color:${color}">${winRate}%</span>
      </div>
      <div class="spark"><div class="spark-fill" style="width:${winRate}%;background:${color}"></div></div>
    </div>`;
  }).join("")||`<div class="empty" style="grid-column:1/-1">No topic data yet</div>`;

  // Win rate bars
  const sorted=[...(d.topics||[])].sort((a,b)=>{
    const wa=a.videos?a.approved/a.videos:0;
    const wb=b.videos?b.approved/b.videos:0;
    return wb-wa;
  });
  document.getElementById("winRateBars").innerHTML=sorted.map(t=>{
    const wr=t.videos?Math.round(t.approved/t.videos*100):0;
    const cls=wr>=80?"green":wr>=50?"amber":"red";
    return`<div class="bar">
      <span class="name">${t.topic}</span>
      <span class="track"><i class="${cls}" style="width:${wr}%"></i></span>
      <span class="num mono">${wr}% (${t.approved}/${t.videos})</span>
    </div>`;
  }).join("")||`<div class="empty">No data yet</div>`;

  // Session table
  document.getElementById("sessionTable").innerHTML=(d.sessions||[]).map(s=>
    `<tr>
      <td class="mono" style="color:var(--muted)">${s.id}</td>
      <td class="mono">${s.topics||0}</td>
      <td class="mono" style="color:var(--green)">${s.approved||0}</td>
      <td class="mono" style="color:var(--red)">${s.rejected||0}</td>
      <td class="mono">${fmt(s.claude_calls)}</td>
      <td class="mono">${fmt(s.clips)}</td>
      <td class="mono">${fmt(s.el_chars)}</td>
      <td class="mono">${money(s.cost)}</td>
      <td class="mono" style="color:var(--muted)">${s.duration_s!=null?Math.round(s.duration_s/60)+"m":"—"}</td>
    </tr>`).join("")||`<tr><td colspan="9" style="text-align:center;color:var(--faint);padding:24px">No sessions yet — run the pipeline</td></tr>`;
}

load();
</script>
</body>
</html>
