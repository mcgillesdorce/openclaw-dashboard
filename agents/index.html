<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Psyche — Agents</title>
  <link rel="stylesheet" href="../shared.css">
</head>
<body>
<nav>
  <a class="nav-brand" href="/">🧠 Psyche <span>Control</span></a>
  <a class="tab" href="/">Overview</a>
  <a class="tab" href="/schedule/">Schedule</a>
  <a class="tab" href="/analytics/">Analytics</a>
  <a class="tab active" href="/agents/">Agents</a>
  <a class="tab" href="/billing/">Billing</a>
  <a class="tab" href="/tracker/">Tracker</a>
  <span class="nav-status" id="navUpdated">updated: —</span>
  <div class="nav-dot"></div>
</nav>

<div class="page">
  <div class="section-title mb-2xl">🤖 Agent Status & Performance</div>

  <!-- Agent Grid -->
  <div class="grid g2 mb-2xl" id="agentGrid">
    <div class="card">
      <div style="text-align: center; padding: var(--gap-2xl); color: var(--text-muted);">Loading agents...</div>
    </div>
  </div>

  <!-- Agent Logs -->
  <div class="section">
    <div class="section-title">Recent Agent Activity</div>
    <div class="timeline" id="activityLog">
      <div class="event">
        <div class="event-icon">⏳</div>
        <div class="event-time">—</div>
        <div class="event-agent">Loading</div>
        <div class="event-desc">Fetching activity...</div>
        <div class="event-cost">—</div>
      </div>
    </div>
  </div>

  <div class="data-footer">
    <span style="color: var(--text-dim);">Data source: GitHub | Last sync: <span id="lastSync" style="color: var(--cyan); font-family: 'Monaco', 'Courier New', monospace;">—</span></span>
  </div>
</div>

<script src="../config.js"></script>
<script>
const DATA_REPO = 'mcgillesdorce/openclaw-dashboard';
const DATA_BRANCH = 'data';

const AGENTS = [
  {
    name: 'Psyche',
    emoji: '🧠',
    role: 'Pipeline Orchestration',
    description: 'Main orchestrator • Repo management • Approvals',
    color: '#00d9ff'
  },
  {
    name: 'Finch',
    emoji: '💰',
    role: 'Financial Analyst',
    description: 'Cost tracking • Budget monitoring • Alerts',
    color: '#f59e0b'
  },
  {
    name: 'Scout',
    emoji: '📖',
    role: 'Topic Discovery',
    description: 'Trend analysis • Research • Topic suggestions',
    color: '#10b981'
  },
  {
    name: 'Pulse',
    emoji: '📊',
    role: 'Performance Analytics',
    description: 'Engagement tracking • Insights • Optimization',
    color: '#a855f7'
  }
];

async function fetchData(file) {
  try {
    const url = `https://raw.githubusercontent.com/${DATA_REPO}/${DATA_BRANCH}/${file}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.error(`Failed to fetch ${file}:`, err);
    return null;
  }
}

function renderAgents() {
  const html = AGENTS.map(agent => `
    <div class="card">
      <div style="display: flex; align-items: flex-start; gap: var(--gap-lg); margin-bottom: var(--gap-lg);">
        <div style="font-size: 40px;">${agent.emoji}</div>
        <div style="flex: 1;">
          <div style="font-weight: 700; font-size: 16px; color: var(--text-primary);">${agent.name}</div>
          <div style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: var(--gap-xs);">${agent.role}</div>
          <div style="font-size: 13px; color: var(--text-secondary); line-height: 1.5;">${agent.description}</div>
        </div>
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-lg); padding: var(--gap-lg) 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);">
        <div>
          <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: var(--gap-sm);">Status</div>
          <div style="display: flex; align-items: center; gap: var(--gap-sm);">
            <span class="status-dot live"></span>
            <span style="color: var(--green); font-weight: 700;">Active</span>
          </div>
        </div>
        <div>
          <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: var(--gap-sm);">Last Run</div>
          <div style="font-size: 13px; color: var(--cyan); font-family: 'Monaco', 'Courier New', monospace;" class="lastRun" data-agent="${agent.name}">—</div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--gap-md); margin-top: var(--gap-lg); text-align: center;">
        <div>
          <div style="font-size: 11px; color: var(--text-muted); margin-bottom: var(--gap-xs);">Tasks Today</div>
          <div style="font-size: 18px; font-weight: 700; color: var(--cyan); font-family: 'Monaco', 'Courier New', monospace;" class="taskCount" data-agent="${agent.name}">—</div>
        </div>
        <div>
          <div style="font-size: 11px; color: var(--text-muted); margin-bottom: var(--gap-xs);">Success Rate</div>
          <div style="font-size: 18px; font-weight: 700; color: var(--green); font-family: 'Monaco', 'Courier New', monospace;" class="successRate" data-agent="${agent.name}">—</div>
        </div>
        <div>
          <div style="font-size: 11px; color: var(--text-muted); margin-bottom: var(--gap-xs);">Cost</div>
          <div style="font-size: 18px; font-weight: 700; color: var(--cyan); font-family: 'Monaco', 'Courier New', monospace;" class="agentCost" data-agent="${agent.name}">—</div>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('agentGrid').innerHTML = html;
}

async function updateAgentMetrics() {
  const data = await fetchData('dashboard_data.json');
  if (!data || !data.videos) return;

  // Aggregate metrics per agent (example implementation)
  const agentMetrics = {
    'Psyche': { tasks: 0, success: 0, cost: 0 },
    'Finch': { tasks: 0, success: 0, cost: 0 },
    'Scout': { tasks: 0, success: 0, cost: 0 },
    'Pulse': { tasks: 0, success: 0, cost: 0 }
  };

  data.videos.forEach(v => {
    if (v.generated_by) {
      agentMetrics[v.generated_by].tasks++;
      if (v.approved) agentMetrics[v.generated_by].success++;
      agentMetrics[v.generated_by].cost += v.cost_usd || 0;
    }
  });

  // Update UI
  Object.keys(agentMetrics).forEach(agent => {
    const metrics = agentMetrics[agent];
    const successRate = metrics.tasks > 0 ? (metrics.success / metrics.tasks * 100).toFixed(0) : '—';

    const lastRun = document.querySelector(`.lastRun[data-agent="${agent}"]`);
    const taskCount = document.querySelector(`.taskCount[data-agent="${agent}"]`);
    const successRateEl = document.querySelector(`.successRate[data-agent="${agent}"]`);
    const costEl = document.querySelector(`.agentCost[data-agent="${agent}"]`);

    if (lastRun) lastRun.textContent = formatTimeAgo(new Date());
    if (taskCount) taskCount.textContent = metrics.tasks;
    if (successRateEl) successRateEl.textContent = successRate + (successRate !== '—' ? '%' : '');
    if (costEl) costEl.textContent = '$' + metrics.cost.toFixed(2);
  });
}

async function renderActivityLog() {
  const data = await fetchData('schedule_data.json');
  if (!data || !data.events) return;

  const events = data.events.slice(0, 10);
  const html = events.map(evt => {
    const icon = evt.status === 'success' ? '✅' : '❌';
    return `
      <div class="event">
        <div class="event-icon">${icon}</div>
        <div class="event-time">${evt.time || '—'}</div>
        <div class="event-agent">${evt.agent || '—'}</div>
        <div class="event-desc">${evt.task || '—'}</div>
        <div class="event-cost">${evt.cost || '—'}</div>
      </div>
    `;
  }).join('');

  document.getElementById('activityLog').innerHTML = html;
}

function formatTimeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000);
  if (seconds < 60) return 'now';
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return minutes + 'm';
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + 'h';
  return Math.floor(hours / 24) + 'd';
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById('navUpdated').textContent = `updated: ${now.toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'})}`;
  document.getElementById('lastSync').textContent = now.toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'});
}

async function update() {
  renderAgents();
  await updateAgentMetrics();
  await renderActivityLog();
  updateTimestamp();
}

setInterval(update, 30000);
update();
</script>
</body>
</html>
